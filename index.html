<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>无限回廊 · Infinite Corridor</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ============ 天花板层：管道 + 应急灯 ============ -->
<div id="ceiling">
  <div class="pipe pipe-left"></div>
  <div class="pipe pipe-right"></div>
  <div class="pipe-drip drip-left"></div>
  <div class="pipe-drip drip-right"></div>
  <div id="emergency-light">
    <div class="light-bulb"></div>
    <div class="light-cone"></div>
  </div>
  <div id="ceiling-notify">◆ 回廊通讯待命中 ◆</div>
</div>

<!-- ============ 回廊主体：3D 透视空间 ============ -->
<div id="corridor">

  <!-- 透视消失线 -->
  <div class="perspective-lines">
    <div class="vanish-line vl-top-left"></div>
    <div class="vanish-line vl-top-right"></div>
    <div class="vanish-line vl-bottom-left"></div>
    <div class="vanish-line vl-bottom-right"></div>
  </div>

  <!-- 走廊深处尽头 —— 副本之门 -->
  <div id="far-door">
    <div class="door-frame">
      <div class="door-label">NO. <span id="door-number">---</span></div>
      <div class="door-placard" id="door-dungeon-name">当前无活跃副本</div>
      <div class="door-light" id="door-light"></div>
      <div class="door-handle"></div>
    </div>
    <div class="door-glow"></div>
  </div>

  <!-- ====== 左墙 ====== -->
  <div id="left-wall" class="wall">
    <!-- 契约者档案 —— 像一张钉在墙上的表格 -->
    <div class="wall-poster" id="poster-identity">
      <div class="poster-header">
        <span class="poster-pin">◆</span>
        <span class="poster-title">契约者档案</span>
        <span class="poster-pin">◆</span>
      </div>
      <div class="poster-body">
        <div class="poster-row"><span>姓名</span><span id="h-name">---</span></div>
        <div class="poster-row"><span>阶位</span><span id="h-rank">一阶</span></div>
        <div class="poster-row"><span>等级</span><span id="h-lv"><span class="chalk-num" data-path="契约者.头部.等级">3</span></span></div>
        <div class="poster-row"><span>军衔</span><span id="h-army">上士</span></div>
        <div class="poster-row"><span>CR</span><span id="h-cr">4.2</span></div>
        <div class="poster-row"><span>回廊态度</span><span id="h-att">关注</span></div>
      </div>
    </div>

    <!-- 属性 —— 像刻在墙上的粉笔标记 -->
    <div class="wall-markings" id="markings-stats">
      <div class="mark-row">
        <span class="mark-label">STR</span>
        <span class="mark-val" id="attr-str">11</span>
        <span class="mark-bar"><span class="mark-fill str" id="fill-str"></span></span>
      </div>
      <div class="mark-row">
        <span class="mark-label">AGI</span>
        <span class="mark-val" id="attr-agi">6</span>
        <span class="mark-bar"><span class="mark-fill agi" id="fill-agi"></span></span>
      </div>
      <div class="mark-row">
        <span class="mark-label">CON</span>
        <span class="mark-val" id="attr-con">18</span>
        <span class="mark-bar"><span class="mark-fill con" id="fill-con"></span></span>
      </div>
      <div class="mark-row">
        <span class="mark-label">PER</span>
        <span class="mark-val" id="attr-per">9</span>
        <span class="mark-bar"><span class="mark-fill per" id="fill-per"></span></span>
      </div>
    </div>

    <!-- 小队 —— 墙上照片 -->
    <div class="wall-polaroids" id="squad-polaroids"></div>
  </div>

  <!-- ====== 右墙 ====== -->
  <div id="right-wall" class="wall">

    <!-- HP/MP 状态 —— 墙上的仪表盘 -->
    <div class="wall-gauge" id="gauge-hp">
      <div class="gauge-label">HP</div>
      <div class="gauge-track"><div class="gauge-fill hp-fill" id="gauge-hp-fill"></div></div>
      <div class="gauge-num" id="gauge-hp-num">218/270</div>
    </div>
    <div class="wall-gauge" id="gauge-mp">
      <div class="gauge-label">MP</div>
      <div class="gauge-track"><div class="gauge-fill mp-fill" id="gauge-mp-fill"></div></div>
      <div class="gauge-num" id="gauge-mp-num">90/90</div>
    </div>
    <div class="wall-gauge" id="gauge-sp">
      <div class="gauge-label">耐力</div>
      <div class="gauge-track"><div class="gauge-fill sp-fill" id="gauge-sp-fill"></div></div>
      <div class="gauge-num" id="gauge-sp-num">155/180</div>
    </div>

    <!-- 生命状态 + 特殊状态 —— 警示标志 -->
    <div class="wall-warning" id="warning-life">
      <div class="warn-stripes"></div>
      <div class="warn-text" id="state-life">受伤</div>
    </div>
    <div class="wall-warning small" id="warning-special">
      <div class="warn-stripes"></div>
      <div class="warn-text" id="state-special-text">疲惫</div>
    </div>

    <!-- 敌人情报 —— 墙上警报 -->
    <div class="wall-alert" id="alert-enemies">
      <div class="alert-header">◆ 交战中 ◆</div>
      <div class="alert-count" id="enemy-count-wall">0</div>
    </div>
  </div>

  <!-- ====== 地面：物品与互动 ====== -->
  <div id="floor">
    <div class="floor-grid"></div>
    <div class="floor-items" id="floor-items">
      <!-- 散落在地上的物品会在这里显示 -->
    </div>
    <div class="floor-reflections"></div>
  </div>

  <!-- ====== 走廊中心站：核心交互区 ====== -->
  <div id="hallway-center">
    <!-- 墙上血字提示 -->
    <div id="blood-text">NEVER<br>LOOK<br>BACK</div>

    <!-- 地上的通讯器 -->
    <div id="radio" title="回廊通讯器">
      <div class="radio-body">
        <div class="radio-speaker"></div>
        <div class="radio-dial"></div>
        <div class="radio-light"></div>
      </div>
      <div class="radio-label">回廊通讯</div>
    </div>

    <!-- 墙上的按钮面板 -->
    <div id="wall-panel">
      <button class="panel-btn active" data-view="identity" title="状态档案">
        <span class="btn-icon">◎</span><span class="btn-label">档案</span>
      </button>
      <button class="panel-btn" data-view="dungeon" title="副本情报">
        <span class="btn-icon">◈</span><span class="btn-label">副本</span>
      </button>
      <button class="panel-btn" data-view="enemies" title="敌情警戒">
        <span class="btn-icon">⚠</span><span class="btn-label">敌情</span>
      </button>
      <button class="panel-btn" data-view="map" title="回廊地图">
        <span class="btn-icon">⊙</span><span class="btn-label">地图</span>
      </button>
      <button class="panel-btn" data-view="jobtree" title="职业树">
        <span class="btn-icon">⟐</span><span class="btn-label">职业</span>
      </button>
    </div>
  </div>

</div>

<!-- ============ 详情覆盖层（点击墙上海报展开） ============ -->
<div id="detail-overlay">
  <div id="detail-panel">
    <div id="detail-close">╳</div>
    <div id="detail-content"></div>
  </div>
  <div id="detail-backdrop"></div>
</div>

<!-- ============ 回廊通讯器展开 ============ -->
<div id="radio-overlay">
  <div id="radio-panel">
    <div id="radio-static"></div>
    <div id="radio-messages"></div>
    <div id="radio-input-area">
      <input type="text" id="radio-input" placeholder="按住通话…" autocomplete="off">
      <button id="radio-send">发送</button>
    </div>
    <div id="radio-close">关闭通讯</div>
  </div>
  <div id="radio-backdrop"></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
