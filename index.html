<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>无限回廊 · Infinite Corridor</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ============ 余烬背景 ============ -->
<canvas id="ember-bg"></canvas>

<!-- ============ 天花板 ============ -->
<div id="ceiling-slab">
  <div id="ceiling-pipes">
    <div class="pipe-run"></div>
    <div class="pipe-run delay"></div>
  </div>
  <div id="hanging-light">
    <div class="bulb-wire"></div>
    <div class="bulb-glass"></div>
  </div>
</div>

<!-- ============ 回廊主体 ============ -->
<div id="corridor-scene">

  <!-- 左墙 -->
  <div id="wall-left" class="corridor-wall">

    <!-- 血肉纹理 -->
    <div class="flesh-veins"></div>
    <div class="rust-patches"></div>
    <div class="blood-streak s1"></div>
    <div class="blood-streak s2"></div>

    <!-- 门洞1：契约者档案（近） -->
    <div class="doorway dl-1" data-view="identity">
      <div class="door-recess">
        <div class="door-plate">契 约 者 档 案</div>
        <div class="door-status" id="door-status-identity">◆ 活跃 ◆</div>
      </div>
      <div class="door-bloodstain"></div>
    </div>

    <!-- 门洞2：小队（中近） -->
    <div class="doorway dl-2" data-view="squad">
      <div class="door-recess">
        <div class="door-plate">小 队 名 册</div>
        <div class="door-status dim" id="door-status-squad">无队员</div>
      </div>
    </div>

    <!-- 门洞3：职业树（远） -->
    <div class="doorway dl-3" data-view="jobtree">
      <div class="door-recess">
        <div class="door-plate">职 业 路 线</div>
        <div class="door-status" id="door-status-job">前线突击兵</div>
      </div>
    </div>

    <!-- 墙上刻字 -->
    <div class="wall-scratch scratch-l1">NO RETURN</div>
    <div class="wall-scratch scratch-l2">契约即枷锁</div>
  </div>

  <!-- 右墙 -->
  <div id="wall-right" class="corridor-wall">

    <div class="flesh-veins right"></div>
    <div class="rust-patches right"></div>
    <div class="blood-streak s3"></div>

    <!-- 门洞4：副本情报（近） -->
    <div class="doorway dr-1" data-view="dungeon">
      <div class="door-recess">
        <div class="door-plate">副 本 情 报</div>
        <div class="door-status" id="door-status-dungeon">无活跃副本</div>
      </div>
      <div class="door-crack"></div>
    </div>

    <!-- 门洞5：敌情警戒（中近） -->
    <div class="doorway dr-2" data-view="enemies">
      <div class="door-recess">
        <div class="door-plate">敌 情 警 戒</div>
        <div class="door-status danger" id="door-status-enemies">安全</div>
      </div>
      <div class="door-alert-light"></div>
    </div>

    <!-- 门洞6：回廊地图（远） -->
    <div class="doorway dr-3" data-view="map">
      <div class="door-recess">
        <div class="door-plate">回 廊 地 图</div>
        <div class="door-status dim">15 处设施</div>
      </div>
    </div>

    <!-- 墙上手印 -->
    <div class="wall-handprint hp1"></div>
    <div class="wall-handprint hp2"></div>
  </div>

  <!-- ====== 地面 ====== -->
  <div id="floor-plain">
    <div class="floor-grid-lines"></div>
    <div class="floor-blood-pool"></div>
    <div class="floor-crack"></div>

    <!-- 地上物品 -->
    <div class="floor-item fi-1" id="bag-teaser">
      <span class="fi-icon">▣</span>
      <span class="fi-label">背包</span>
      <span class="fi-count" id="bag-count">4件</span>
    </div>
    <div class="floor-item fi-2" id="radio-teaser">
      <span class="fi-icon">◉</span>
      <span class="fi-label">通讯器</span>
    </div>

    <!-- 脚印 -->
    <div class="footprint fp1"></div>
    <div class="footprint fp2"></div>
  </div>

  <!-- ====== 走廊尽头 ====== -->
  <div id="far-end">
    <!-- 副本之门 -->
    <div id="portal-door" data-view="dungeon">
      <div class="portal-frame">
        <div class="portal-glow"></div>
        <div class="portal-surface"></div>
        <div class="portal-label">◆ ENTER ◆</div>
        <div class="portal-name" id="portal-name">当前无活跃副本</div>
      </div>
      <div class="portal-light-rays"></div>
    </div>

    <!-- 门上方的血肉增生 -->
    <div class="flesh-growth"></div>
  </div>

</div>

<!-- ============ 底部 HUD 条 ============ -->
<div id="hud-bar">
  <!-- HP -->
  <div class="hud-stat">
    <span class="hud-label">HP</span>
    <div class="hud-track"><div class="hud-fill hp" id="hud-hp-fill"></div></div>
    <span class="hud-num" id="hud-hp-num">218/270</span>
  </div>
  <!-- MP -->
  <div class="hud-stat">
    <span class="hud-label">MP</span>
    <div class="hud-track"><div class="hud-fill mp" id="hud-mp-fill"></div></div>
    <span class="hud-num" id="hud-mp-num">90/90</span>
  </div>
  <!-- SP -->
  <div class="hud-stat">
    <span class="hud-label">耐力</span>
    <div class="hud-track"><div class="hud-fill sp" id="hud-sp-fill"></div></div>
    <span class="hud-num" id="hud-sp-num">155/180</span>
  </div>
  <!-- Name -->
  <div class="hud-stat hud-name">
    <span class="hud-label">契约者</span>
    <span class="hud-num" id="hud-name">---</span>
  </div>
  <!-- Life State -->
  <div class="hud-stat">
    <span class="hud-label">状态</span>
    <span class="hud-num danger" id="hud-life-state">受伤</span>
  </div>
</div>

<!-- ============ 详情覆盖层 ============ -->
<div id="overlay">
  <div id="overlay-bg"></div>
  <div id="overlay-panel">
    <div id="overlay-close">╳</div>
    <div id="overlay-content"></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
